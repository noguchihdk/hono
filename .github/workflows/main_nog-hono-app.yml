name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize ZIP timestamps
        run: |
          mkdir deploy-package
          unzip dist.zip -d deploy-package

          # ZIP内の全ファイルとディレクトリの更新日時を現在時刻にそろえる
          find deploy-package -exec touch {} +

          cd deploy-package
          zip -r ../deploy.zip .

      - name: Show ZIP contents
        run: unzip -l deploy.zip

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: nog-hono-app
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy.zip
